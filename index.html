<!DOCTYPE html>

    <ellipse cx="280" cy="104" rx="16" ry="13" fill="#6aaad8" opacity=".8"/>

    <circle cx="342" cy="38" r="20" fill="#fff8d0" opacity=".6"/>

</div>
<div class="sea-wrap"></div>

<!-- ══════════════════════════════
     PETALS
══════════════════════════════ -->
<div id="petals"></div>

<!-- ══════════════════════════════
     MUSIC DONGLE
══════════════════════════════ -->
<button class="music-btn" id="musicBtn" onclick="toggleMusic()" aria-label="toggle music">
  <span class="music-icon">♪</span>
  <div class="mbars">
    <div class="mbar"></div>
    <div class="mbar"></div>
    <div class="mbar"></div>
    <div class="mbar"></div>
  </div>
</button>
<div class="song-label" id="songLabel">Jatuh Suka — Tulus</div>

<!-- ══════════════════════════════
     MAIN CONTENT
══════════════════════════════ -->
<div class="pw">
  <div class="hd">
    <div class="hd-eye">✦ Happy Birthday✦</div>
    <h1 class="hd-title">Elvira</h1>
    <div class="hd-rule">quotes for u</div>
  </div>

  <div class="bo">
    <div class="bsh"></div>
    <div class="bk" id="bk">
      <div class="pto" id="pto"></div>
      <div class="bp">
        <!-- Watermark windmill -->
        <svg class="pwm" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="50" stroke="#7a9068" stroke-width="1.4" fill="none"/>
          <g transform="translate(60,60)">
            <circle cx="0" cy="-15" r="8" fill="#a8b89a"/>
            <circle cx="13" cy="-7.5" r="8" fill="#a8b89a"/>
            <circle cx="13" cy="7.5" r="8" fill="#a8b89a"/>
            <circle cx="0" cy="15" r="8" fill="#a8b89a"/>
            <circle cx="-13" cy="7.5" r="8" fill="#a8b89a"/>
            <circle cx="-13" cy="-7.5" r="8" fill="#a8b89a"/>
            <circle cx="0" cy="0" r="7" fill="#c9a84c"/>
          </g>
        </svg>
        <!-- Slides injected by script.js -->
        <div class="sc"><div class="st" id="st"></div></div>
        <div class="pgf" id="pgf">halaman 1 dari 6</div>
      </div>
    </div>
  </div>

  <div class="nav">
    <button class="nb" id="pb" onclick="go(-1)" disabled aria-label="sebelumnya">‹</button>
    <div class="dots" id="dotsEl"></div>
    <span class="pgl" id="pgl">1 / 6</span>
    <button class="nb" id="nb2" onclick="go(1)" aria-label="berikutnya">›</button>
  </div>
  <p class="hint">↔ geser untuk pindah halaman yawww</p>
</div>

<!-- ══════════════════════════════
     LIGHTBOX
══════════════════════════════ -->
<div class="lb" id="lb" onclick="cLb(event)">
  <div class="lbs" id="lbs">
    <div class="lbh"></div>
    <button class="lbcl" onclick="cLb()" aria-label="tutup">✕</button>
    <svg class="lbjsm" viewBox="0 0 120 120">
      <g transform="translate(60,60)">
        <circle cx="0" cy="-16" r="9" fill="#a8b89a"/><circle cx="14" cy="-8" r="9" fill="#a8b89a"/>
        <circle cx="14" cy="8" r="9" fill="#a8b89a"/><circle cx="0" cy="16" r="9" fill="#a8b89a"/>
        <circle cx="-14" cy="8" r="9" fill="#a8b89a"/><circle cx="-14" cy="-8" r="9" fill="#a8b89a"/>
        <circle cx="0" cy="0" r="8" fill="#c9a84c"/>
      </g>
    </svg>
    <span class="lbbq">"</span>
    <p class="lbt" id="lbt"></p>
    <div class="lbm">
      <span class="lbn" id="lbn"></span>
      <span class="lbtg" id="lbtg"></span>
    </div>
    <div class="lbdots"><span></span><span></span><span></span></div>
  </div>
</div>

<audio id="bgMusic" src="jatuhsuka.mp3" loop></audio>
